# Railway config for the background worker service.
# In Railway dashboard: create a second service from the same repo,
# set buildContext to "backend", and override the start command to:
#   WORKER=true /app/entrypoint.sh

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"
buildContext = "backend"

[deploy]
startCommand = "WORKER=true /app/entrypoint.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
