# Production Docker Compose — Oracle Cloud Always Free VM (Ampere A1: 4 vCPU / 24 GB)
#
# Usage:
#   cp .env.prod .env
#   docker compose -f docker-compose.prod.yml up -d
#
# Required .env variables:
#   POSTGRES_PASSWORD  — strong random password (openssl rand -hex 32)
#   REDIS_PASSWORD     — strong random password (openssl rand -hex 24)
#   ADMIN_TOKEN        — admin API token (openssl rand -hex 20)
#   FPL_TEAM_ID        — your FPL entry ID
#   NEXT_PUBLIC_API_URL — public backend URL (e.g. https://api.yourdomain.com)
#   NEXT_PUBLIC_WS_URL  — public WebSocket URL (e.g. wss://api.yourdomain.com/ws/live)
#   SENDGRID_API_KEY   — optional, for email alerts
#   SENDGRID_FROM_EMAIL — optional, sender address

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fpl_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Do NOT expose port 5432 externally in production
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # allkeys-lru eviction + password protection + max memory
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --save ""
      --appendonly no
    expose:
      - '6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1.2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/fpl_intelligence
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      ENVIRONMENT: production
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      FPL_TEAM_ID: ${FPL_TEAM_ID}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_artifacts:/app/models/ml/artifacts
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4 --log-level info"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 6G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/fpl_intelligence
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
      ADMIN_TOKEN: ${ADMIN_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_artifacts:/app/models/ml/artifacts
    command: >
      sh -c "alembic upgrade head &&
             python worker.py"
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3001:3000'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  pgdata:
  model_artifacts:
